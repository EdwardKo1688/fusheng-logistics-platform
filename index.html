*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--surface-alt);color:var(--text);line-height:1.6;overflow:hidden;height:100vh;display:flex}

.nav-sec{padding:14px 22px 5px;font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 22px;cursor:pointer;color:rgba(255,255,255,.6);font-size:.88rem;position:relative;transition:all .15s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(59,130,246,.15);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{width:20px;text-align:center;font-size:1rem;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.62rem;padding:1px 7px;border-radius:10px;font-weight:600}

/* Main */
.main{margin-left:270px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.header h2{font-size:1.1rem;font-weight:600}
.phase-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:.72rem;font-weight:600;background:#dbeafe;color:#1e40af}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Common */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:22px;margin-bottom:18px;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .2s}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-label{font-size:.76rem;color:var(--text-sec);font-weight:500;margin-bottom:6px}
.stat-value{font-size:1.65rem;font-weight:700;letter-spacing:-.02em;line-height:1.1}

.tag-blue{background:#dbeafe;color:#1d4ed8}.tag-green{background:#d1fae5;color:#047857}
.tag-yellow{background:#fef3c7;color:#b45309}.tag-red{background:#fee2e2;color:#dc2626}
.tag-purple{background:#ede9fe;color:#7c3aed}.tag-cyan{background:#cffafe;color:#0891b2}
.tag-orange{background:#ffedd5;color:#ea580c}

.progress-bar{width:100%;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}

table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-sec);font-weight:600;background:var(--surface-alt)}
td{font-size:.82rem}
tr:hover td{background:#f8fafc}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px}
.tab{padding:9px 18px;cursor:pointer;font-size:.83rem;font-weight:500;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.check-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;color:#fff;font-weight:700}

.arch-layer{border:2px solid;border-radius:var(--radius);padding:14px;margin-bottom:10px}
.arch-layer-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.arch-modules{display:flex;flex-wrap:wrap;gap:7px}
.arch-mod{padding:7px 13px;border-radius:8px;font-size:.76rem;font-weight:500;border:1px solid;background:#fff}

.kanban{display:flex;gap:14px;overflow-x:auto}
.kanban-col{min-width:240px;flex:1;background:var(--surface-alt);border-radius:var(--radius);padding:14px}
.kanban-col-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.kanban-card:hover{box-shadow:0 1px 3px rgba(0,0,0,.08);transform:translateY(-1px)}
.kanban-card h5{font-size:.8rem;font-weight:600;margin-bottom:5px}
.kanban-card .tags{display:flex;gap:3px;flex-wrap:wrap}
.kanban-card .tags .tag{font-size:.6rem;padding:1px 5px}

/* Bar chart CSS only */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding:10px 0;border-bottom:1px solid var(--border)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:4px 4px 0 0;min-width:20px;transition:height .5s ease}
.bar-label{font-size:.6rem;color:var(--text-muted);writing-mode:horizontal-tb;text-align:center}
.bar-val{font-size:.6rem;font-weight:600;color:var(--text-sec)}

/* Pie chart CSS */
.pie-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Hero */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1e293b 100%);border-radius:var(--radius);padding:40px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.15)0%,transparent 70%);pointer-events:none}
.hero h1{font-size:1.9rem;font-weight:900;letter-spacing:-.02em;margin-bottom:6px;position:relative;z-index:1}
.hero p{font-size:.9rem;color:rgba(255,255,255,.7);max-width:680px;line-height:1.7;position:relative;z-index:1}
.evolution{display:flex;align-items:center;gap:0;margin-top:20px;flex-wrap:wrap;position:relative;z-index:1}
.evo-step{padding:10px 20px;border-radius:8px;font-weight:600;font-size:.82rem}
.evo-arrow{font-size:1.3rem;padding:0 6px;color:rgba(255,255,255,.35)}

/* page sections hidden by default */
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>

        ${it.badge?`<span class="nav-badge">${it.badge}</span>`:''}
      </div>`;
    });
  });
  nav.innerHTML = h;
}

function switchView(id){
  currentView = id;
