<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富昇智慧物流平台 | 營運推動協作中心</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
:root {
  --primary:#0f172a;--accent:#3b82f6;--accent-light:#60a5fa;--success:#10b981;
  --warning:#f59e0b;--danger:#ef4444;--orange:#f97316;--purple:#8b5cf6;--cyan:#06b6d4;
  --surface:#fff;--surface-alt:#f8fafc;--border:#e2e8f0;--text:#0f172a;
  --text-sec:#64748b;--text-muted:#94a3b8;--radius:12px;
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--surface-alt);color:var(--text);line-height:1.6;overflow:hidden;height:100vh;display:flex}

/* Sidebar */
.sidebar{width:270px;background:var(--primary);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow:hidden}
.sidebar-brand{padding:20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h1{font-size:1.2rem;font-weight:700}
.sidebar-brand .sub{font-size:.68rem;color:var(--accent-light);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.nav-sec{padding:14px 22px 5px;font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 22px;cursor:pointer;color:rgba(255,255,255,.6);font-size:.88rem;position:relative;transition:all .15s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(59,130,246,.15);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{width:20px;text-align:center;font-size:1rem;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.62rem;padding:1px 7px;border-radius:10px;font-weight:600}

/* Main */
.main{margin-left:270px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.header h2{font-size:1.1rem;font-weight:600}
.phase-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:.72rem;font-weight:600;background:#dbeafe;color:#1e40af}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Common */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:22px;margin-bottom:18px;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .2s}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-label{font-size:.76rem;color:var(--text-sec);font-weight:500;margin-bottom:6px}
.stat-value{font-size:1.65rem;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.stat-sub{font-size:.7rem;margin-top:5px;color:var(--text-muted)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:6px;font-size:.7rem;font-weight:600}
.tag-blue{background:#dbeafe;color:#1d4ed8}.tag-green{background:#d1fae5;color:#047857}
.tag-yellow{background:#fef3c7;color:#b45309}.tag-red{background:#fee2e2;color:#dc2626}
.tag-purple{background:#ede9fe;color:#7c3aed}.tag-cyan{background:#cffafe;color:#0891b2}
.tag-orange{background:#ffedd5;color:#ea580c}

.progress-bar{width:100%;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}

table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-sec);font-weight:600;background:var(--surface-alt)}
td{font-size:.82rem}
tr:hover td{background:#f8fafc}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px}
.tab{padding:9px 18px;cursor:pointer;font-size:.83rem;font-weight:500;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.check-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;color:#fff;font-weight:700}

.arch-layer{border:2px solid;border-radius:var(--radius);padding:14px;margin-bottom:10px}
.arch-layer-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.arch-modules{display:flex;flex-wrap:wrap;gap:7px}
.arch-mod{padding:7px 13px;border-radius:8px;font-size:.76rem;font-weight:500;border:1px solid;background:#fff}

.kanban{display:flex;gap:14px;overflow-x:auto}
.kanban-col{min-width:240px;flex:1;background:var(--surface-alt);border-radius:var(--radius);padding:14px}
.kanban-col-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.kanban-card:hover{box-shadow:0 1px 3px rgba(0,0,0,.08);transform:translateY(-1px)}
.kanban-card h5{font-size:.8rem;font-weight:600;margin-bottom:5px}
.kanban-card .tags{display:flex;gap:3px;flex-wrap:wrap}
.kanban-card .tags .tag{font-size:.6rem;padding:1px 5px}

/* Bar chart CSS only */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding:10px 0;border-bottom:1px solid var(--border)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:4px 4px 0 0;min-width:20px;transition:height .5s ease}
.bar-label{font-size:.6rem;color:var(--text-muted);writing-mode:horizontal-tb;text-align:center}
.bar-val{font-size:.6rem;font-weight:600;color:var(--text-sec)}

/* Pie chart CSS */
.pie-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Hero */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1e293b 100%);border-radius:var(--radius);padding:40px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.15)0%,transparent 70%);pointer-events:none}
.hero h1{font-size:1.9rem;font-weight:900;letter-spacing:-.02em;margin-bottom:6px;position:relative;z-index:1}
.hero p{font-size:.9rem;color:rgba(255,255,255,.7);max-width:680px;line-height:1.7;position:relative;z-index:1}
.evolution{display:flex;align-items:center;gap:0;margin-top:20px;flex-wrap:wrap;position:relative;z-index:1}
.evo-step{padding:10px 20px;border-radius:8px;font-weight:600;font-size:.82rem}
.evo-arrow{font-size:1.3rem;padding:0 6px;color:rgba(255,255,255,.35)}

/* page sections hidden by default */
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h1>富昇智慧物流</h1>
    <div class="sub">營運推動協作中心</div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</div>

<div class="main">
  <div class="header">
    <h2 id="headerTitle">📊 總覽儀表板</h2>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="phase-badge">Phase 1: 基礎建設期</span>
      <span style="font-size:.78rem;color:var(--text-sec)">2026 Q1-Q2</span>
    </div>
  </div>
  <div class="content" id="contentArea"></div>
</div>

<script>
// ====== NAV DATA ======
const NAV = [
  {section:'總覽', items:[
    {id:'dashboard',icon:'📊',label:'總覽儀表板'}
  ]},
  {section:'商務領域', items:[
    {id:'vision',icon:'🎯',label:'戰略願景',badge:'NEW'},
    {id:'market',icon:'🌐',label:'市場機會'},
    {id:'customers',icon:'👥',label:'目標客戶策略'},
    {id:'services',icon:'📦',label:'服務矩陣'},
    {id:'revenue',icon:'💰',label:'商勝模式與獲利'},
  ]},
  {section:'技術平台', items:[
    {id:'architecture',icon:'🏗️',label:'平台技術架構'},
    {id:'devmode',icon:'⚙️',label:'開發模式評估'},
    {id:'systems',icon:'🔧',label:'系統盤點與整合'},
    {id:'ai',icon:'🤖',label:'AI 智慧應用'},
  ]},
  {section:'專案管理', items:[
    {id:'pmo',icon:'📋',label:'PMO 專案管理'},
    {id:'roadmap',icon:'🗺️',label:'二年路線圖'},
    {id:'kpi',icon:'📈',label:'KPI 追蹤'},
    {id:'team',icon:'🤝',label:'團隊協作'},
  ]},
];

let currentView = 'dashboard';
let subTabs = {};

// ====== BUILD SIDEBAR ======
function buildSidebar(){
  const nav = document.getElementById('sidebarNav');
  let h = '';
  NAV.forEach(sec => {
    h += `<div class="nav-sec">${sec.section}</div>`;
    sec.items.forEach(it => {
      h += `<div class="nav-item${it.id===currentView?' active':''}" data-id="${it.id}" onclick="switchView('${it.id}')">
        <span class="nav-icon">${it.icon}</span><span>${it.label}</span>
        ${it.badge?`<span class="nav-badge">${it.badge}</span>`:''}
      </div>`;
    });
  });
  nav.innerHTML = h;
}

function switchView(id){
  currentView = id;
  buildSidebar();
  const flat = NAV.flatMap(s=>s.items);
  const item = flat.find(i=>i.id===id);
  document.getElementById('headerTitle').textContent = (item?item.icon+' '+item.label:'');
  renderPage(id);
}

// ====== HELPERS ======
function card(title,tag,content,style=''){
  return `<div class="card" style="${style}">
    ${title?`<div class="card-hdr"><span class="card-title">${title}</span>${tag?`<span class="tag ${tag[1]}">${tag[0]}</span>`:''}</div>`:''}
    ${content}</div>`;
}
function statCard(label,value,color,sub='',style=''){
  return `<div class="stat-card" style="${style}"><div class="stat-label">${label}</div><div class="stat-value" style="color:${color}">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}
function checkItem(num,text,sub='',bg='var(--accent)'){
  return `<div class="check-item"><span class="check-dot" style="background:${bg}">${num}</span><div><div style="font-weight:500;font-size:.84rem">${text}</div>${sub?`<div style="font-size:.7rem;color:var(--text-muted)">${sub}</div>`:''}</div></div>`;
}
function makeBar(data,maxVal,color){
  return `<div class="bar-chart">${data.map(d=>{
    const h = Math.round((d.v/maxVal)*160);
    return `<div class="bar-col"><div class="bar-val">${d.v}</div><div class="bar" style="height:${h}px;background:${color};width:100%"></div><div class="bar-label">${d.l}</div></div>`;
  }).join('')}</div>`;
}
function tabsHtml(id,tabs){
  subTabs[id] = subTabs[id]||0;
  return `<div class="tabs">${tabs.map((t,i)=>`<div class="tab${subTabs[id]===i?' active':''}" onclick="setSubTab('${id}',${i})">${t}</div>`).join('')}</div>`;
}
function setSubTab(id,idx){ subTabs[id]=idx; renderPage(currentView); }

// ====== PAGE RENDERERS ======
const pages = {};

pages.dashboard = function(){
  const barData = [{l:'1月',v:12},{l:'2月',v:14},{l:'3月',v:15},{l:'4月',v:18},{l:'5月',v:21},{l:'6月',v:23},{l:'7月',v:27},{l:'8月',v:30},{l:'9月',v:34},{l:'10月',v:39},{l:'11月',v:43},{l:'12月',v:48}];

  const kpis = [
    {n:'平台化訂單占比',c:50,t:65,u:'%'},{n:'活躍貨主數',c:85,t:200,u:'家'},
    {n:'活躍車隊/司機',c:180,t:500,u:'人'},{n:'準時率',c:94.5,t:98,u:'%'},
    {n:'異常率',c:4.8,t:2,u:'%',inv:1},{n:'每單毛利',c:22,t:35,u:'NTD'}
  ];

  let kpiHtml = kpis.slice(0,5).map(k=>{
    const pct = k.inv? Math.min(100,Math.round(k.t/k.c*100)) : Math.min(100,Math.round(k.c/k.t*100));
    const clr = pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)';
    return `<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px"><span style="font-weight:500">${k.n}</span><span style="color:var(--text-sec)">${k.c}${k.u} / ${k.t}${k.u}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${clr}"></div></div></div>`;
  }).join('');

  const tasks = [
    ['成立平台事業 PMO','總經理室'],['現有系統與資料完整盤點','資訊部'],
    ['核心/周邊能力定義','PMO'],['專車與棧板系統可用性評估','營運部'],
    ['MVP範圍與技衇藍圖確認','技衇長'],['合作夥伴評估與分工確認','商務部']
  ];

  return `
    <div class="hero">
      <h1>富昇智慧物流平台與運能交易所</h1>
      <p>以 MOMO 場景為起點，推動車貨匹配、智慧調度與物流生態系發展之二年商業計畫。從傳統配送執行角色，升級為平台型物流科技公司。</p>
      <div class="evolution">
        <span class="evo-step" style="background:rgba(59,130,246,.2);color:#93c5fd">企業物流</span><span class="evo-arrow">→</span>
        <span class="evo-step" style="background:rgba(16,185,129,.2);color:#6ee7b7">物流企業</span><span class="evo-arrow">→</span>
        <span class="evo-step" style="background:rgba(245,158,11,.2);color:#fcd34d">物流平台</span><span class="evo-arrow">→</span>
        <span class="evo-step" style="background:rgba(139,92,246,.2);color:#c4b5fd">智慧物流生態系</span>
      </div>
    </div>
    <div class="grid-4" style="margin-bottom:18px">
      ${statCard('MOMO 配送覆蓋率','50%','var(--accent)','↑ 目標 65%')}
      ${statCard('第三地出貨訆鶸指指率+,'95%','var(--success)','地址覆蓋範圍')}
      ${statCard('每日 S90 貨件量','60萬','var(--orange)','台灣市場總量')}
      ${statCard('專案進度','Phase 1','var(--purple)','基礎建設期')}
    </div>
    <div class="grid-2">
      ${card('📈 營運訂單成長預估（千單/月）',['二年規劃','tag-blue'],makeBar(barData,50,'var(--accent)'))}
      ${card('🎯 KPI 達成狀態',null,kpiHtml)}
    </div>
    ${card('🏃 Phase 1 關鍵任務',null,`<div class="grid-3">${tasks.map((t,i)=>checkItem(i+1,t[0],t[1],'#94a3b8')).join('')}</div>`)}
  `;
};

pages.vision = function(){
  const pillars = [
    ['🔄','可交易的運能平台','建立運能供需撮合市場，讓車隊與貨主高效對接','#3b82f6'],
    ['📐','可規則化的配送服務','S90/1.9噸/3.5fn/專車/棧板各有標準化服務顜則','#10b981'],
    ['👁�','可視化的物流算理中樒','全程可追踤、可分析、可預議的營運平台','#f59e0b'],
    ['📊','可累積數據的智慧決策底度','每筆交易沉美數據，驗動AI預測與優化','#8b5cf6'],
    ['🌱','�可延伸的生態系服務平台','保險、修。金融、SaaS等高附加僼值服務','#06b6d4'],
  ];
  const advantages = ['MOMO平台與第三地出貨的真實場景','既有配送與履約流程','真實商家與供應商接觸點','網站、出貨單與配送服務流程可導流','先由內部閉環驗證，再外擴市場','由履約中樞升級為運能交易平台'];
  return `
    <div class="card" style="border-left:4px solid var(--accent)">
      <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:6px">戰略定位</h3>
      <p style="font-size:.92rem;color:var(--text-sec);line-height:1.8;margin-bottom:14px">整合 S90 小件、1.9噸與3.5噸配送、第三地出貨、專車、棧板與外部合作車隊的<strong>智慧物流平台與運能交易所</strong>。</p>
      <div class="evolution">
        <span class="evo-step" style="background:#dbeafe;color:#1e40af">企業物流</span><span class="evo-arrow" style="color:var(--text-muted)">→</span>
        <span class="evo-step" style="background:#d1fae5;color:#065f46">物流企業</span><span class="evo-arrow" style="color:var(--text-muted)">→</span>
        <span class="evo-step" style="background:#fef3c7;color:#92400e">物流平台</span><span class="evo-arrow" style="color:var(--text-muted)">→</span>
        <span class="evo-step" style="background:#ede9fe;color:#5b21b6">智慧物流生態系</span>
      </div>
    </div>
    ${card('🏗️ 五大戰略支柱',null,`<div class="grid-3" style="gap:14px">${pillars.map(p=>`<div class="stat-card" style="border-top:3px solid ${p[3]}"><div style="font-size:1.4rem;margin-bottom:6px">${p[0]}</div><div style="font-weight:600;font-size:.88rem;margin-bottom:5px">${p[1]}</div><div style="font-size:.76rem;color:var(--text-sec);line-height:1.5">${p[2]}</div></div>`).join('')}</div>`)}
    <div class="grid-2">
      ${card('💪 富昇先天利基',null,advantages.map((a,i)=>checkItem('✓',a,'','var(--success)')).join(''))}
      ${card('🚛 運能結構',null,`
        <div style="margin-bottom:14px"><div style="font-weight:600;font-size:.84rem;margin-bottom:6px;color:var(--accent)">自有主力運能</div>
        <div style="font-size:.8rem;color:var(--text-sec);padding:3px 0">• 1.9 噸車 — 區域配送/商家出貨/城市配送</div>
        <div style="font-size:.8rem;color:var(--text-sec);padding:3px 0">• 3.5 噸車 — 較高載重/特定路線配送</div>
        <div style="font-size:.8rem;color:var(--text-sec);padding:3px 0">• 機車 — S90小件/即時配送/短鏈補貨</div></div>
        <div><div style="font-weight:600;font-size:.84rem;margin-bottom:6px;color:var(--success)">外部合作運能</div>

pages.kpi = function(){
  const kpis = [
    {n:'平台化訂單占比',c:50,t:65,u:'%'},{n:'活躍貨主數',c:85,t:200,u:'家'},
    {n:'活躍車隊/司機',c:180,t:500,u:'人'},{n:'準時率',c:94.5,t:98,u:'%'},
    {n:'異常率',c:4.8,t:2,u:'%',inv:1},{n:'每單毛利',c:22,t:35,u:'NTD'},
    {n:'平台GMV',c:18,t:50,u:'M/月'},{n:'生態系收入占比',c:2,t:15,u:'%'},

  const orderData = [{l:'1月',v:12},{l:'3月',v:15},{l:'5月',v:21},{l:'7月',v:27},{l:'9月',v:34},{l:'12月',v:48}];
  const vehicleData = [{l:'1月',v:12},{l:'3月',v:15},{l:'5月',v:18},{l:'7月',v:22},{l:'9月',v:27},{l:'12月',v:39}];

  return `<div class="grid-4" style="margin-bottom:18px">${kpis.map(k=>{

  }).join('')}</div>
  <div class="grid-2">
    ${card('📊 訂單成長趨勢（千單/月）',null,makeBar(orderData,50,'var(--accent)'))}

pages.team = function(){
  const t = subTabs.team||0;
  let content = '';
  if(t===0){
    const strats = [['策略A：直接導入','系統成熟、流程完整、可快速上線','#3b82f6'],['策略B：前台整合','新平台承接入口，既有系統處理任務，API回寫','#10b981'],['策略C：過渡整合','初期先導入降低時程風險，長期再評估內化','#f59e0b']];
    content = `<div class="grid-3">${strats.map(s=>`<div class="card" style="border-top:4px solid ${s[2]}"><h4 style="font-weight:600;margin-bottom:7px">${s[0]}</h4><p style="font-size:.8rem;color:var(--text-sec)">${s[1]}</p></div>`).join('')}</div>`;
  }
  if(t===1){
    const criteria = ['是否真正理解平台型物流商模','是否理解多邊交易規則、履約、結算與風控','是否能接受富昇掌握核心規格與資料主權','是否可提供模組與方法論，而非只賣整包黑盒','是否願意先做 MVP / 詥點再擴大','是否提供 API、文件、知識移轉與治理機制'];
    content = card('外部合作夤伴評估原則',null,criteria.map((c,i)=>checkItem(i+1,c,'','var(--warning)')).join(''));
  }
  if(t===2){
    const items = ['功能成熟度','可整合性','API 能力','主資料結構','對帳與結算能力','維運成本','是否影響未來平台擴張','是否形成新的供應商綁定'];
    content = card('專車/棧板系統評估檢視項',null,`<div class="grid-2">${items.map(i=>`<div class="stat-card" style="padding:11px"><div style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></span><span style="font-size:.84rem;font-weight:500">${i}</span></div></div>`).join('')}</div>`);
  }
  return tabsHtml('team',['專車棧板整合策略','合作夥伴評估','決策原則'])+content;
};
